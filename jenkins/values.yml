controller:
  installPlugins:
    - kubernetes
    - workflow-aggregator
    - git
    - configuration-as-code
    - credentials-binding
    - blueocean
    - owasp-dependency-check:1.7.0
    - sonar:2.13.1
    - quality-gates:1.0.3
    - pipeline-stage-view:2.19
  JCasC:
    enabled: true
    configScripts:
      welcome-message: |
        jenkins:
          systemMessage: "Jenkins running on KinD 🚀"

  resources:
    requests:
      cpu: "100m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

  serviceType: ClusterIP

agent:
  enabled: true
  image:
    repository: jenkins/inbound-agent
    tag: alpine
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "200m"
      memory: "512Mi"
